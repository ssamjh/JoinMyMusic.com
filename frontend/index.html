    <style>
      .volume-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .volume-label {
        margin-top: 15px;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #input-volume {
        max-width: 500px;
      }
      #div-volume {
        display: none;
        flex-direction: column;
        align-items: center;
      }
      .div-playing-title {
        min-height: 17px;
      }
      .div-playing-artist {
        min-height: 13px;
      }
      /* Song Request Modal Styles */
      .song-result-item {
        display: flex;
        align-items: center;
        padding: 10px;
        text-decoration: none;
        color: inherit;
        transition: background-color 0.2s;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .song-result-item:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      .song-result-image {
        width: 40px;
        height: 40px;
        margin-right: 15px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .song-result-info {
        flex-grow: 1;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        min-width: 0;
      }
      .song-result-title {
        font-weight: bold;
        margin: 0;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        margin-right: 10px;
      }
      .song-result-artist {
        margin: 0;
        font-size: 0.9em;
        color: #8c8c8c;
        text-align: right;
        white-space: nowrap;
        flex-shrink: 0;
      }
      #spotify-preview {
        border: none;
        border-radius: 8px;
        width: 100%;
        max-width: 300px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .spotify-preview-container {
        margin: 15px auto;
        display: flex;
        justify-content: center;
      }

      #spotify-preview {
        border: none;
        border-radius: 12px;
        width: 100%;
        max-width: 300px;
        background-color: transparent;
      }

      .spotify-preview-container {
        margin: 15px auto;
        display: flex;
        justify-content: center;
        background-color: transparent;
        padding: 0;
      }

      #spotify-preview-wrapper {
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        max-width: 300px;
        background-color: transparent;
        position: relative;
      }

      /* Enhanced animated background layers */
      .background-container {
        display: none; /* replaced by #bg-canvas */
      }

      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        pointer-events: none;
        filter: blur(20px);
      }

      .background-set {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .background-set.active {
        opacity: 1;
      }

      .background-set.inactive {
        opacity: 0;
      }

      .background-layer {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        opacity: 0.7;
        filter: blur(60px);
      }

      .bg-layer-1 {
        animation: float1 20s ease-in-out infinite,
          pulse1 8s ease-in-out infinite,
          morph1 15s ease-in-out infinite;
        opacity: 0.8;
        width: 80%;
        height: 80%;
      }

      .bg-layer-2 {
        animation: float2 25s ease-in-out infinite,
          pulse2 12s ease-in-out infinite,
          morph2 18s ease-in-out infinite;
        opacity: 0.6;
        width: 90%;
        height: 90%;
      }

      .bg-layer-3 {
        animation: float3 30s ease-in-out infinite,
          pulse3 10s ease-in-out infinite,
          morph3 22s ease-in-out infinite;
        opacity: 0.4;
        width: 100%;
        height: 100%;
      }

      .bg-layer-4 {
        animation: float4 35s ease-in-out infinite,
          pulse4 15s ease-in-out infinite,
          morph4 25s ease-in-out infinite;
        opacity: 0.3;
        filter: blur(80px);
        width: 110%;
        height: 110%;
      }

      .bg-layer-5 {
        animation: float5 40s ease-in-out infinite,
          pulse5 18s ease-in-out infinite,
          morph5 30s ease-in-out infinite;
        opacity: 0.2;
        filter: blur(100px);
        width: 120%;
        height: 120%;
      }

      /* Enhanced floating animations - adjusted for smaller area */
      @keyframes float1 {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1);
        }
        25% {
          transform: translate(-30%, -60%) rotate(90deg) scale(1.2);
        }
        50% {
          transform: translate(-40%, -40%) rotate(180deg) scale(0.9);
        }
        75% {
          transform: translate(-60%, -30%) rotate(270deg) scale(1.1);
        }
      }

      @keyframes float2 {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1.1);
        }
        25% {
          transform: translate(-70%, -40%) rotate(-90deg) scale(1);
        }
        50% {
          transform: translate(-40%, -70%) rotate(180deg) scale(1.3);
        }
        75% {
          transform: translate(-30%, -50%) rotate(270deg) scale(0.95);
        }
      }

      @keyframes float3 {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(0.95);
        }
        25% {
          transform: translate(-45%, -35%) rotate(120deg) scale(1.15);
        }
        50% {
          transform: translate(-55%, -65%) rotate(240deg) scale(1.05);
        }
        75% {
          transform: translate(-65%, -45%) rotate(360deg) scale(1);
        }
      }

      @keyframes float4 {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1.05);
        }
        33% {
          transform: translate(-35%, -65%) rotate(150deg) scale(1.25);
        }
        66% {
          transform: translate(-65%, -35%) rotate(300deg) scale(0.85);
        }
      }

      @keyframes float5 {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0deg) scale(1.15);
        }
        50% {
          transform: translate(-60%, -60%) rotate(180deg) scale(1.35);
        }
      }

      /* Enhanced vignette overlay - softer for smaller gradient area */
      .vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          ellipse at center,
          transparent 20%,
          rgba(0, 0, 0, 0.2) 40%,
          rgba(0, 0, 0, 0.5) 70%,
          rgba(0, 0, 0, 0.7) 100%
        );
        z-index: -1;
        pointer-events: none;
      }

      /* Optional: Add a subtle glow effect around the album art */
      #playing-image {
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        transition: box-shadow 0.3s ease;
      }

      #playing-image:hover {
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      }

      #playing-image:hover {
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      }

      /* Morphing blob keyframes */
      @keyframes morph1 {
        0%, 100% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
        25%      { border-radius: 60% 40% 30% 70% / 40% 60% 70% 30%; }
        50%      { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        75%      { border-radius: 70% 30% 50% 60% / 30% 50% 70% 40%; }
      }
      @keyframes morph2 {
        0%, 100% { border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%; }
        25%      { border-radius: 35% 65% 55% 45% / 55% 45% 35% 65%; }
        50%      { border-radius: 65% 35% 45% 55% / 60% 40% 55% 45%; }
        75%      { border-radius: 45% 55% 65% 35% / 35% 65% 45% 55%; }
      }
      @keyframes morph3 {
        0%, 100% { border-radius: 55% 45% 50% 50% / 45% 55% 40% 60%; }
        25%      { border-radius: 40% 60% 65% 35% / 60% 40% 55% 45%; }
        50%      { border-radius: 60% 40% 35% 65% / 35% 65% 60% 40%; }
        75%      { border-radius: 35% 65% 50% 50% / 55% 45% 35% 65%; }
      }
      @keyframes morph4 {
        0%, 100% { border-radius: 45% 55% 55% 45% / 50% 50% 45% 55%; }
        25%      { border-radius: 65% 35% 40% 60% / 35% 65% 55% 45%; }
        50%      { border-radius: 35% 65% 60% 40% / 65% 35% 40% 60%; }
        75%      { border-radius: 55% 45% 35% 65% / 40% 60% 65% 35%; }
      }
      @keyframes morph5 {
        0%, 100% { border-radius: 50% 50% 45% 55% / 55% 45% 50% 50%; }
        25%      { border-radius: 70% 30% 55% 45% / 30% 70% 45% 55%; }
        50%      { border-radius: 30% 70% 50% 50% / 70% 30% 55% 45%; }
        75%      { border-radius: 50% 50% 70% 30% / 45% 55% 30% 70%; }
      }

      /* Film grain overlay */
      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0.04;
        background-repeat: repeat;
      }

      /* Disable background animations */
      .no-bg-animation .background-container,
      .no-bg-animation .vignette,
      .no-bg-animation .grain-overlay,
      .no-bg-animation #bg-canvas,
      .no-bg-animation #viz-canvas {
        display: none;
      }

      #bgToggleBtn {
        font-size: 0.75rem;
      }

      /* Text readability against reactive background */
      body.bg h2,
      body.bg h4,
      body.bg h5,
      body.bg p,
      body.bg strong,
      body.bg .div-playing-title,
      body.bg .div-playing-title a,
      body.bg .div-playing-artist,
      body.bg .div-playing-artist a,
      body.bg footer a,
      body.bg footer div {
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 0, 0, 0.7);
      }

      /* Hide the color extraction canvas */
      #color-canvas {
        display: none;
      }

      #viz-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.5s ease;
      }
    </style>

    <script>
      const audioStream = document.getElementById("audio-stream");
      const buttonToggle = document.getElementById("button-toggle");
      const playingImage = document.getElementById("playing-image");
      const playingLink = document.getElementById("playing-link");
      const divVolume = document.getElementById("div-volume");
      const inputVolume = document.getElementById("input-volume");
      let isPlaying = false;
      let pollInterval = null;
      let lastVotedSongId = null;
      let mutedSongId = null;
      let songId = null;
      let selectedSongData = null;
      let songConfirmModal;
      // currentBgSet removed — background handled by #bg-canvas
      let hlsFailed = false;
      let hlsInstance = null;

      // Enhanced background effects globals
      let audioContext = null;
      let analyser = null;
      let audioSource = null;
      let grainFrames = [];
      let grainIntervalId = null;
      let grainFrameIndex = 0;

      // Visualizer globals
      let vizCanvas, vizCtx, vizRafId;
      let currentRgbColors = { r: 80, g: 80, b: 80 };
      let smoothedBass = 0;
      let smoothedMid = 0;
      let gainNode = null;
      let currentGain = 1.0;

      // Background canvas globals
      let bgCanvas, bgCtx, bgRafId, bgLastTime = 0;
      let bgColorCurr = { r: 20, g: 20, b: 20 };
      let bgColorTarget = { r: 20, g: 20, b: 20 };

      function generateUUID() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(
          /[xy]/g,
          function (c) {
            var r = (Math.random() * 16) | 0,
              v = c == "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          }
        );
      }

      function getOrCreateUUID() {
        let uuid = storageGet("userUUID");
        if (!uuid) {
          uuid = generateUUID();
          storageSet("userUUID", uuid);
        }
        return uuid;
      }

      function storageSet(key, value) {
        localStorage.setItem(key, value);
      }

      function storageGet(key) {
        return localStorage.getItem(key);
      }

      function updateButtons() {
        const voteSkipBtn = document.getElementById("voteSkipBtn");
        const muteSongBtn = document.getElementById("muteSongBtn");

        if (isPlaying) {
          voteSkipBtn.disabled = songId === lastVotedSongId;
          muteSongBtn.disabled = false;
          muteSongBtn.textContent = audioStream.muted
            ? "Unmute Song"
            : "Mute Song";
        } else {
          voteSkipBtn.disabled = true;
          muteSongBtn.disabled = true;
          muteSongBtn.textContent = "Mute Song";
        }
      }

      function enableConfirmButton(token) {
        document.getElementById("confirmRequestBtn").disabled = false;
        document.getElementById("confirmRequestBtn").dataset.turnstileToken =
          token;
      }

      function enableVoteSkipButton(token) {
        console.log("Vote skip Turnstile callback executed with token:", token);
        const button = document.getElementById("confirmVoteSkipBtn");
        if (button) {
          button.disabled = false;
          button.dataset.turnstileToken = token;
          console.log("Vote skip button enabled:", button.disabled);
        } else {
          console.error("Could not find confirmVoteSkipBtn element");
        }
      }

      function pollServer() {
        if (!isPlaying) return;

        const listenerName = storageGet("requesterName") || "";
        const userUUID = getOrCreateUUID();

        const volume = parseInt(storageGet("volume") ?? "50", 10);
        fetch("/api/listener", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uuid: userUUID, name: listenerName, volume }),
        }).catch((error) => console.error("Error polling server:", error));
      }

      function startPolling() {
        if (!pollInterval) {
          pollInterval = setInterval(pollServer, 30000); // Poll every 30 seconds
          pollServer(); // Poll immediately
        }
      }

      function stopPolling() {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
      }

      function fallbackToIcecast() {
        console.log("Using Icecast fallback stream");
        audioStream.src = "https://icecast.sjh.at/spotifynet";
        audioStream.play();
      }

      function icecastFallbackHandler() {
        console.warn("Native HLS error, falling back to Icecast");
        hlsFailed = true;
        fallbackToIcecast();
      }

      function scaleVolume(inputValue) {
        return inputValue <= 50
          ? inputValue * 0.2
          : 10 + (inputValue - 50) * 0.4;
      }

      function qualityUpdate() {
        let wasPlaying = !audioStream.paused;

        // Clean up previous HLS instance
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        if (!hlsFailed && Hls.isSupported()) {
          hlsInstance = new Hls();
          hlsInstance.loadSource("https://hls.sjh.at/spotifynet/stream.m3u8");
          hlsInstance.attachMedia(audioStream);

          hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
              console.warn("HLS fatal error, falling back to Icecast", data);
              hlsFailed = true;
              hlsInstance.destroy();
              hlsInstance = null;
              fallbackToIcecast();
            }
          });
        } else if (!hlsFailed && audioStream.canPlayType("application/vnd.apple.mpegurl")) {
          audioStream.src = "https://hls.sjh.at/spotifynet/stream.m3u8";
          audioStream.addEventListener("error", icecastFallbackHandler, { once: true });
        } else {
          fallbackToIcecast();
        }

        if (wasPlaying) {
          audioStream.play();
        }
      }

      // --- Enhanced Background Effects ---

      function initAudioContext() {
        if (audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.4;
        analyser.minDecibels = -60;  // raise floor — cuts dead silence, spreads compressed signal
        analyser.maxDecibels = -5;   // near 0dBFS peak for compressed/loudness-war tracks
        gainNode = audioContext.createGain();
        gainNode.gain.value = currentGain;
      }

      function connectAudioSource() {
        if (!audioContext || audioSource) return;
        try {
          audioSource = audioContext.createMediaElementSource(audioStream);
          // analyser taps the full-amplitude signal; gainNode controls output volume
          audioSource.connect(analyser);
          analyser.connect(gainNode);
          gainNode.connect(audioContext.destination);
          audioStream.volume = 1.0;
          console.log('[DEBUG] Audio source connected, audioContext state:', audioContext.state);
        } catch (e) {
          console.warn('Audio source connection failed:', e);
        }
      }

      function initGrain() {
        grainFrames = [];
        for (let f = 0; f < 3; f++) {
          const offscreen = document.createElement('canvas');
          offscreen.width = 128;
          offscreen.height = 128;
          const ctx = offscreen.getContext('2d');
          const imageData = ctx.createImageData(128, 128);
          for (let i = 0; i < imageData.data.length; i += 4) {
            const v = Math.random() * 255;
            imageData.data[i] = v;
            imageData.data[i + 1] = v;
            imageData.data[i + 2] = v;
            imageData.data[i + 3] = 255;
          }
          ctx.putImageData(imageData, 0, 0);
          grainFrames.push(offscreen.toDataURL('image/png'));
        }
        startGrainAnimation();
      }

      function startGrainAnimation() {
        if (grainIntervalId) return;
        const grainEl = document.querySelector('.grain-overlay');
        if (!grainEl || document.body.classList.contains('no-bg-animation')) return;
        grainIntervalId = setInterval(function () {
          grainFrameIndex = (grainFrameIndex + 1) % grainFrames.length;
          grainEl.style.backgroundImage = 'url(' + grainFrames[grainFrameIndex] + ')';
        }, 100);
      }

      function stopGrainAnimation() {
        if (grainIntervalId) {
          clearInterval(grainIntervalId);
          grainIntervalId = null;
        }
      }

      // --- Background Canvas ---

      function initBgCanvas() {
        bgCanvas = document.getElementById('bg-canvas');
        bgCtx = bgCanvas.getContext('2d');
        resizeBgCanvas();
        window.addEventListener('resize', resizeBgCanvas);
      }

      function resizeBgCanvas() {
        if (!bgCanvas) return;
        bgCanvas.width = Math.max(1, Math.floor(window.innerWidth / 8));
        bgCanvas.height = Math.max(1, Math.floor(window.innerHeight / 8));
      }

      function startBg() {
        if (bgRafId || document.body.classList.contains('no-bg-animation')) return;
        drawBgLoop();
      }

      function stopBg() {
        if (bgRafId) {
          cancelAnimationFrame(bgRafId);
          bgRafId = null;
        }
        if (bgCtx) bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      }

      function drawBgLoop(timestamp) {
        bgRafId = requestAnimationFrame(drawBgLoop);
        if (timestamp - bgLastTime < VIZ_INTERVAL) return;
        bgLastTime = timestamp;

        // Lerp toward target color (~2 second transition at 15fps)
        bgColorCurr.r += (bgColorTarget.r - bgColorCurr.r) * 0.06;
        bgColorCurr.g += (bgColorTarget.g - bgColorCurr.g) * 0.06;
        bgColorCurr.b += (bgColorTarget.b - bgColorCurr.b) * 0.06;

        const W = bgCanvas.width, H = bgCanvas.height;
        const cx = W / 2, cy = H / 2;
        const { r, g, b } = bgColorCurr;
        const scale = 1 + smoothedBass * 0.4;

        bgCtx.clearRect(0, 0, W, H);

        // Main centered glow
        const maxR = Math.max(W, H) * 0.55 * scale;
        const grd = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.9)`);
        grd.addColorStop(0.45, `rgba(${r}, ${g}, ${b}, 0.45)`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd;
        bgCtx.fillRect(0, 0, W, H);

        // Offset secondary glow for depth
        const grd2 = bgCtx.createRadialGradient(W * 0.25, H * 0.25, 0, W * 0.25, H * 0.25, maxR * 0.7);
        grd2.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.25)`);
        grd2.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd2;
        bgCtx.fillRect(0, 0, W, H);

        const grd3 = bgCtx.createRadialGradient(W * 0.75, H * 0.75, 0, W * 0.75, H * 0.75, maxR * 0.7);
        grd3.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.2)`);
        grd3.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd3;
        bgCtx.fillRect(0, 0, W, H);
      }

      // --- End Background Canvas ---

      // --- Audio Visualizer ---

      function initVizCanvas() {
        vizCanvas = document.getElementById('viz-canvas');
        vizCtx = vizCanvas.getContext('2d');
        resizeVizCanvas();
        window.addEventListener('resize', resizeVizCanvas);
      }

      function resizeVizCanvas() {
        if (!vizCanvas) return;
        // Render at 1/5 resolution — soft glows are indistinguishable, massive GPU savings
        vizCanvas.width = Math.floor(window.innerWidth / 5);
        vizCanvas.height = Math.floor(window.innerHeight / 5);
      }

      function startViz() {
        if (vizRafId || document.body.classList.contains('no-bg-animation')) return;
        vizCanvas.style.opacity = '1';
        drawViz();
      }

      function stopViz() {
        if (vizRafId) {
          cancelAnimationFrame(vizRafId);
          vizRafId = null;
        }
        if (vizCanvas) {
          vizCanvas.style.opacity = '0';
          setTimeout(() => {
            if (vizCtx && !vizRafId) vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
          }, 1500);
        }
        const bgContainer = document.querySelector('.background-container');
        if (bgContainer) bgContainer.style.transform = 'translate(-50%, -50%) scale(1)';
        smoothedBass = 0;
        smoothedMid = 0;
        vizLastTime = 0;
      }

      const VIZ_FPS = 60;
      const VIZ_INTERVAL = 1000 / VIZ_FPS;
      let vizLastTime = 0;

      function drawViz(timestamp) {
        vizRafId = requestAnimationFrame(drawViz);
        if (!analyser) return;
        if (timestamp - vizLastTime < VIZ_INTERVAL) return;
        vizLastTime = timestamp;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        const W = vizCanvas.width;
        const H = vizCanvas.height;
        const cx = W / 2;
        const cy = H / 2;

        // Bass energy (skip DC offset bins 0-1, sample ~first 6%)
        const bassEnd = Math.max(4, Math.floor(bufferLength * 0.06));
        let bass = 0;
        for (let i = 2; i < bassEnd; i++) bass += dataArray[i];
        bass = Math.pow(bass / (bassEnd - 2) / 255, 0.6); // power curve expands compressed signal
        smoothedBass += (bass - smoothedBass) * 0.18;

        // Mid frequency energy
        const midEnd = Math.floor(bufferLength * 0.35);
        let mid = 0;
        for (let i = bassEnd; i < midEnd; i++) mid += dataArray[i];
        mid = Math.pow(mid / (midEnd - bassEnd) / 255, 0.6);
        smoothedMid += (mid - smoothedMid) * 0.14;

        // Pulse the background blob container with bass
        const bgContainer = document.querySelector('.background-container');
        if (bgContainer) {
          bgContainer.style.transform = `translate(-50%, -50%) scale(${1 + smoothedBass * 0.6})`;
        }

        vizCtx.clearRect(0, 0, W, H);

        const { r, g, b } = currentRgbColors;
        const minDim = Math.min(W, H);

        // Center bass glow — large and punchy
        if (smoothedBass > 0.02) {
          const glowR = minDim * 0.25 + smoothedBass * minDim * 0.55;
          const grd = vizCtx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
          grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${smoothedBass * 0.35})`);
          grd.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${smoothedBass * 0.1})`);
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          vizCtx.beginPath();
          vizCtx.arc(cx, cy, glowR, 0, Math.PI * 2);
          vizCtx.fillStyle = grd;
          vizCtx.fill();
        }

        // Corner glows driven by mids
        if (smoothedMid > 0.02) {
          const cornerR = minDim * 0.5 + smoothedMid * minDim * 0.4;
          const cornerAlpha = smoothedMid * 0.18;
          const corners = [[0, 0], [W, 0], [0, H], [W, H]];
          corners.forEach(([x, y]) => {
            const grd = vizCtx.createRadialGradient(x, y, 0, x, y, cornerR);
            grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${cornerAlpha})`);
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            vizCtx.beginPath();
            vizCtx.arc(x, y, cornerR, 0, Math.PI * 2);
            vizCtx.fillStyle = grd;
            vizCtx.fill();
          });
        }
      }

      // --- End Audio Visualizer ---

      initGrain();
      initBgCanvas();
      initVizCanvas();

      // --- End Enhanced Background Effects ---

      function togglePlay() {
        qualityUpdate();

      function volumeSet(val) {
        const scaledVolume = scaleVolume(val);
        currentGain = scaledVolume / 100;
        if (gainNode) {
          gainNode.gain.value = currentGain;

          audioStream.volume = currentGain;
        }
        storageSet("volume", val);

      function preloadImage(url, callback) {
        let img = new Image();
        img.src = url;
        img.onload = callback;
      }

      function handleMetadata(currentData) {
        if (!currentData || !currentData.song) {
          $(".div-playing-title, .div-playing-artist").text("");
          if (
            playingImage.src !==
            "data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
          ) {
            playingImage.src =
              "data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";
          }
          playingLink.setAttribute("href", "javascript:void(0)");
          updateSongId(null);
          return;
        }

        updateSongId(currentData.songid);

        const createLink = (url, id, name) =>
          `<a href="${url}${id}" target="_blank" style="color: inherit; text-decoration: none;">${name}</a>`;

        if (playingImage.src !== currentData.cover) {
          preloadImage(currentData.cover, function () {
            playingImage.src = currentData.cover;
            extractColors(playingImage).then((colors) => {
              updateBackgroundColors(colors);
            });
            $(".div-playing-title").html(
              createLink("https://open.spotify.com/track/", currentData.songid, currentData.song)
            );
            $(".div-playing-artist").html(
              currentData.artist
                .map((artist) =>
                  createLink("https://open.spotify.com/artist/", artist.id, artist.name)
                )
                .join(", ")
            );
            if ("mediaSession" in navigator) {
              if (currentData && currentData.song) {
                navigator.mediaSession.metadata = new MediaMetadata({
                  title: currentData.song,
                  artist: currentData.artist.map((a) => a.name).join(", "),
                  album: currentData.albumid,
                  artwork: [{ src: currentData.cover, sizes: "250x250", type: "image/jpeg" }],
                });
              } else {
                navigator.mediaSession.metadata = null;
              }
            }
            playingLink.setAttribute("href", `https://open.spotify.com/album/${currentData.albumid}`);
          });
        } else {
          $(".div-playing-title").html(
            createLink("https://open.spotify.com/track/", currentData.songid, currentData.song)
          );
          $(".div-playing-artist").html(
            currentData.artist
              .map((artist) =>
                createLink("https://open.spotify.com/artist/", artist.id, artist.name)
              )
              .join(", ")
          );
        }
      }

      function connectSSE() {
        const evtSource = new EventSource("/api/events");

        evtSource.addEventListener("metadata", (e) => {
          handleMetadata(JSON.parse(e.data));
        });

        evtSource.addEventListener("listeners", (e) => {
          const data = JSON.parse(e.data);
          document.getElementById("listener-count").textContent = data.count;
        });

        evtSource.addEventListener("skipvotes", (e) => {
          const data = JSON.parse(e.data);
          document.getElementById("vote-count").textContent = data.count;
          document.getElementById("votes-needed").textContent = data.needed;
        });

        evtSource.onerror = () => {
          evtSource.close();
          setTimeout(connectSSE, 5000);
        };
      }

      function updateSongId(newSongId) {
        if (newSongId !== songId) {
          if (mutedSongId !== null) {
            audioStream.muted = false;
            mutedSongId = null;
          }
          songId = newSongId;
        }
        updateButtons();

      function extractColors(imgElement) {
        return new Promise((resolve) => {
          const canvas = document.getElementById("color-canvas");
          const ctx = canvas.getContext("2d");
          const img = new Image();
          img.crossOrigin = "Anonymous";

          img.onload = function () {
            canvas.width = 50;
            canvas.height = 50;
            ctx.drawImage(img, 0, 0, 50, 50);

            const imageData = ctx.getImageData(0, 0, 50, 50);
            const data = imageData.data;

            let r = 0,
              g = 0,
              b = 0;
            let count = 0;

            // Sample every 4th pixel for performance
            for (let i = 0; i < data.length; i += 16) {
              r += data[i];
              g += data[i + 1];
              b += data[i + 2];
              count++;
            }

            // Calculate average and enhance saturation
            r = Math.floor(r / count);
            g = Math.floor(g / count);
            b = Math.floor(b / count);

            // Enhance saturation and create more dramatic variations
            const enhanceFactor = 1.5;
            const primary = `rgb(${Math.min(
              255,
              Math.floor(r * enhanceFactor)
            )}, ${Math.min(255, Math.floor(g * enhanceFactor))}, ${Math.min(
              255,
              Math.floor(b * enhanceFactor)
            )})`;
            const secondary = `rgb(${Math.min(255, r + 60)}, ${Math.min(
              255,
              g + 60
            )}, ${Math.min(255, b + 60)})`;
            const tertiary = `rgb(${Math.max(0, r - 40)}, ${Math.max(
              0,
              g - 40
            )}, ${Math.max(0, b - 40)})`;
            const quaternary = `rgb(${Math.min(
              255,
              Math.floor(r * 0.7)
            )}, ${Math.min(255, Math.floor(g * 1.3))}, ${Math.min(
              255,
              Math.floor(b * 0.9)
            )})`;
            const quinary = `rgb(${Math.min(
              255,
              Math.floor(r * 1.2)
            )}, ${Math.min(255, Math.floor(g * 0.8))}, ${Math.min(
              255,
              Math.floor(b * 1.4)
            )})`;

            resolve({ primary, secondary, tertiary, quaternary, quinary });
          };

          img.onerror = function () {
            // Enhanced fallback colors
            resolve({
              primary: "#3a1a1a",
              secondary: "#2a2a4a",
              tertiary: "#1a3a2a",
              quaternary: "#4a2a1a",
              quinary: "#2a1a4a",
            });
          };

          img.src = imgElement.src;
        });
      }

      function parseRgb(str) {
        const m = str.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
        return m ? { r: +m[1], g: +m[2], b: +m[3] } : { r: 80, g: 80, b: 80 };
      }

      // Update background canvas target colors on song change
      function updateBackgroundColors(colors) {
        currentRgbColors = parseRgb(colors.primary);
        bgColorTarget = { ...currentRgbColors };
      }


      // Cookie helpers
      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
      }

      // Background animation toggle
      // Default: OFF. Only auto-enable on capable desktop devices.
      function shouldEnableAnimations() {
        // Always disable if user prefers reduced motion
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return false;

        // Detect mobile/tablet — always disable
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) return false;
        if ('ontouchstart' in window || navigator.maxTouchPoints > 1) return false;

        // Low core count — disable
        if (!navigator.hardwareConcurrency || navigator.hardwareConcurrency <= 4) return false;

        // Small screens are likely low-power or mobile-like
        if (window.screen.width < 1024 || window.screen.height < 768) return false;

        // Check for a real GPU via WebGL renderer string
        try {
          var canvas = document.createElement('canvas');
          var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          if (gl) {
            var debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
              var renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL).toLowerCase();
              // Software renderers or known weak GPUs
              if (renderer.includes('swiftshader') || renderer.includes('llvmpipe') ||
                  renderer.includes('software') || renderer.includes('microsoft basic')) {
                return false;
              }
            }
          } else {
            // No WebGL at all — likely very weak
            return false;
          }
        } catch (e) {
          return false;
        }

        // Passed all checks — capable desktop
        return true;
      }

      (function initBgAnimationToggle() {

          console.error("songSearchButton not found");

        function debounce(func, wait) {
          let timeout;
          return function executedFunction(...args) {
            const later = () => {
              clearTimeout(timeout);
              func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
          };
        }

        function searchSongs() {

            .then((data) => {

            this.disabled = true;
            this.innerHTML =
              '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';

            const requesterName = document
              .getElementById("requesterName")
              .value.trim();
            if (!requesterName) {
              alert("Please enter your name before requesting a song.");
              songConfirmModal.hide();
              $("#songRequestModal").modal("show");
              // Re-enable button if validation fails
              this.disabled = false;
              this.innerHTML = "Confirm Request";
              return;
            }

            // Stop the Spotify preview before sending the request
            stopSpotifyPreview();

            // Add a submission ID to detect duplicates
            const submissionId =
              Date.now() + "-" + Math.random().toString(36).substr(2, 9);
            requestSong(selectedSongData.id, submissionId);
          });

        // Add an event listener for when the confirmation modal is hidden
        document
          .getElementById("songConfirmModal")
          .addEventListener("hidden.bs.modal", function () {
            stopSpotifyPreview();
          });

        function stopSpotifyPreview() {
          const spotifyPreview = document.getElementById("spotify-preview");
          spotifyPreview.src = "about:blank";
        }

        function requestSong(uri, submissionId) {
          const turnstileToken =
            document.getElementById("confirmRequestBtn").dataset.turnstileToken;
          if (!turnstileToken) {
            alert("Please complete the challenge");
            return;
          }
          const requesterName = document
            .getElementById("requesterName")
            .value.trim();
          const confirmBtn = document.getElementById("confirmRequestBtn");

          fetch("/api/request", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              uri,
              name: requesterName,
              submission_id: submissionId,
              turnstile: turnstileToken,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              // Re-enable button regardless of response
              confirmBtn.disabled = false;
              confirmBtn.innerHTML = "Confirm Request";

              if (data.success) {
                songConfirmModal.hide();
                $("#songRequestModal").modal("show");
                displayMessage(data.message);
                setTimeout(() => $("#songRequestModal").modal("hide"), 2000);

                // Save the name in localStorage if it's not already saved
                if (!storageGet("requesterName")) {
                  storageSet("requesterName", requesterName);
                  document.getElementById("requesterName").disabled = true;
                  document.getElementById("changeNameBtn").textContent =
                    "Change Name";
                }
              } else if (data.error) {
                songConfirmModal.hide();
                $("#songRequestModal").modal("show");
                displayMessage(data.error, true);
              } else {
                songConfirmModal.hide();
                $("#songRequestModal").modal("show");
                displayMessage("Failed to send song request.", true);
              }

              // Reset the turnstile widget
              window.turnstile.reset();
            })
            .catch((error) => {
              console.error("Error:", error);
              confirmBtn.disabled = false;
              confirmBtn.innerHTML = "Confirm Request";

              songConfirmModal.hide();
              $("#songRequestModal").modal("show");
              displayMessage(
                "An error occurred while sending the song request.",
                true
              );

              window.turnstile.reset();
            });
        }

        function displayMessage(message, isError = false) {
          const messageDiv = document.createElement("div");
          messageDiv.className = `alert ${
            isError ? "alert-danger" : "alert-success"
          } mt-3`;
          messageDiv.textContent = message;
          searchResults.innerHTML = "";
          searchResults.appendChild(messageDiv);
        }

        document
          .getElementById("confirmVoteSkipBtn")
          .addEventListener("click", function () {
            const turnstileToken = this.dataset.turnstileToken;
            if (!turnstileToken) {
              alert("Please complete the challenge");
              return;
            }

            // Disable button to prevent multiple submissions
            this.disabled = true;
            this.innerHTML =
              '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Submitting...';

            const userUUID = getOrCreateUUID();

            fetch("/api/skip", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ uuid: userUUID, songid: songId, turnstile: turnstileToken }),
            })
              .then((response) => response.json())
              .then((data) => {
                if (data.success) {
                  lastVotedSongId = songId;
                  updateButtons();
                  bootstrap.Modal.getInstance(
                    document.getElementById("voteSkipModal")
                  ).hide();
                } else {
                  alert(data.error || "Failed to submit vote");
                }
                this.disabled = false;
                this.innerHTML = "Vote to Skip";
                try {
                  if (window.turnstile) window.turnstile.reset();
                } catch (e) {
                  console.error("Error resetting turnstile:", e);
                }
              })
              .catch((error) => {
                console.error("Error:", error);
                alert("An error occurred while submitting your vote");
                this.disabled = false;
                this.innerHTML = "Vote to Skip";
                try {
                  if (window.turnstile) window.turnstile.reset();
                } catch (e) {
                  console.error("Error resetting turnstile:", e);
                }
              });
          });
      });

      audioStream.addEventListener("ended", function () {
        isPlaying = false;
        stopPolling();
      });

      document
        .getElementById("voteSkipBtn")
        .addEventListener("click", function () {
          if (!isPlaying || !songId || songId === lastVotedSongId) return;

          // Show vote skip modal instead of immediately submitting
          const voteSkipModal = new bootstrap.Modal(
            document.getElementById("voteSkipModal")
          );
          voteSkipModal.show();
        });

      document
        .getElementById("muteSongBtn")
        .addEventListener("click", function () {
          if (!isPlaying || !songId) return;

          if (audioStream.muted) {
            audioStream.muted = false;
            mutedSongId = null;
          } else {
            audioStream.muted = true;
            mutedSongId = songId;
          }
          updateButtons();
        });
    </script>
    <!-- Song Request Modal -->
    <div
      class="modal fade"
      id="songRequestModal"
      tabindex="-1"
      aria-labelledby="songRequestModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="songRequestModalLabel">
              Request a Song
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  id="requesterName"
                  placeholder="Enter your name" />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="changeNameBtn">
                  Change Name
                </button>
              </div>
            </div>
            <div class="mb-3 input-group">
              <input
                type="text"
                class="form-control"
                id="songSearchInput"
                placeholder="Search for a song..." />
              <button
                class="btn btn-primary"
                type="button"
                id="songSearchButton">
                Search
              </button>
            </div>
            <div id="searchResults" class="list-group">
              <!-- Search results will be dynamically added here -->
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="songConfirmModal"
      tabindex="-1"
      aria-labelledby="songConfirmModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="songConfirmModalLabel">
              Confirm Song Request
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="text-center mb-3">
              <img
                id="confirm-song-image"
                src=""
                alt="Album Cover"
                class="img-fluid rounded mb-3"
                style="max-width: 200px" />
              <h5 id="confirm-song-title" class="mb-1"></h5>
              <p id="confirm-song-artist" class="text-muted"></p>

              <!-- Spotify Preview Widget -->
              <div
                id="spotify-preview-container"
                class="spotify-preview-container mt-3">
                <div id="spotify-preview-wrapper">
                  <iframe
                    id="spotify-preview"
                    src="about:blank"
                    height="80"
                    frameborder="0"
                    allowtransparency="true"
                    allow="encrypted-media">
                  </iframe>
                </div>
              </div>
            </div>
            <div
              class="cf-turnstile mb-3"
              data-sitekey="0x4AAAAAAAeaz0KAvdHl7LvY"
              data-callback="enableConfirmButton"></div>
            <p class="text-center">Do you want to request this song?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal">
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              id="confirmRequestBtn">
              Confirm Request
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="voteSkipModal"
      tabindex="-1"
      aria-labelledby="voteSkipModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="voteSkipModalLabel">
              Confirm Vote to Skip
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to vote to skip the current song?</p>
            <div
              class="cf-turnstile"
              data-sitekey="0x4AAAAAAAeaz0KAvdHl7LvY"
              data-callback="enableVoteSkipButton"></div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal">
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="confirmVoteSkipBtn"
              disabled>
              Vote to Skip
            </button>
          </div>
        </div>
      </div>
    </div>

    <noscript>
      <img
        src="https://stats.sjh.at/ingress/f843459e-231c-4d54-902d-5618ed0cb73d/pixel.gif" />
    </noscript>
    <script
      defer
      src="https://stats.sjh.at/ingress/f843459e-231c-4d54-902d-5618ed0cb73d/script.js"></script>
