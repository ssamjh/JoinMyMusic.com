<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ssamjh's Music Sync</title>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer></script>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      input { font-family: inherit; }

      :root {
        --accent: #8B7BF0;
        --accent-glow: rgba(139, 123, 240, 0.55);
        --c1: #8B7BF0;
        --c2: #2B1D6E;
      }

      /* ---- Theme tokens ---- */
      body.theme-dark {
        --bg: #070708;
        --fg: #f5f5f7;
        --muted: rgba(235, 235, 245, 0.55);
        --elev: rgba(255, 255, 255, 0.07);
        --panel-border: rgba(255, 255, 255, 0.11);
        --modal-surface: rgba(26, 26, 30, 0.92);
      }
      body.theme-light {
        --bg: #edecee;
        --fg: #19191b;
        --muted: rgba(40, 40, 46, 0.74);
        --elev: rgba(0, 0, 0, 0.06);
        --panel-border: rgba(0, 0, 0, 0.09);
        --modal-surface: rgba(252, 252, 253, 0.92);
      }

      body {
        background: var(--bg, #070708);
        color: var(--fg, #f5f5f7);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overscroll-behavior: none;
        transition: background 0.7s ease, color 0.7s ease;
      }

      .app {
        position: fixed;
        inset: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 1;
      }

      /* ---- Backgrounds / effects (audio-reactive canvases) ---- */
      .vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }
      body.theme-dark .vignette {
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 32%,
          rgba(0, 0, 0, 0.4) 78%,
          rgba(0, 0, 0, 0.66) 100%
        );
      }
      body.theme-light .vignette {
        background: radial-gradient(
          ellipse 120% 120% at 50% 42%,
          rgba(255, 255, 255, 0.28) 0%,
          rgba(255, 255, 255, 0) 50%
        );
      }

      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        pointer-events: none;
        filter: blur(20px);
        opacity: 1;
        transition: opacity 0.9s ease;
      }

      /* During a song change the record spins down and flips. Dim the ambient
         background + side glow while it does, and keep them off until the record
         spins back up to the new track. */
      body.fx-dimmed #bg-canvas,
      body.fx-dimmed #viz-canvas {
        opacity: 0 !important;
      }

      #viz-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.5s ease;
      }

      #color-canvas { display: none; }

      /* Disable effects */
      .no-bg-animation .vignette,
      .no-bg-animation #bg-canvas,
      .no-bg-animation #viz-canvas {
        display: none;
      }

      /* Lightweight mode: with effects off, drop GPU-heavy backdrop blurs and continuous
         animations. backdrop-filter is very expensive on mobile (re-blurs everything behind
         the element on every repaint) and runs even when the canvases are disabled. */
      .no-bg-animation .icon-btn,
      .no-bg-animation .ctrl-btn,
      .no-bg-animation .history-item,
      .no-bg-animation .toast,
      .no-bg-animation .modal-overlay,
      .no-bg-animation .modal-card {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .no-bg-animation .eq-badge { display: none; }
      .no-bg-animation .live-dot { animation: none !important; }

      /* ---- Display-only mode (index.html?display) ---- */
      /* Visuals-only kiosk view: keep the album art, title/artist and recently-played
         list, but strip every control + the footer links/copyright. */
      body.display-mode .header-actions,
      body.display-mode .dock,
      body.display-mode footer,
      body.display-mode .live-row {
        display: none !important;
      }

      /* ---- Header ---- */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 28px;
        padding-top: max(16px, env(safe-area-inset-top));
        position: relative;
        z-index: 3;
      }
      .brand-title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .brand-sub {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.02em;
        margin-top: 2px;
      }
      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--panel-border);
        background: var(--elev);
        color: var(--fg);
        cursor: pointer;
        backdrop-filter: blur(20px);
        transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
          background 0.3s, color 0.3s;
      }
      .icon-btn:hover { transform: translateY(-1px); }
      .icon-btn:active { transform: scale(0.92); }
      .icon-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }

      /* ---- Main / now playing ---- */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 0 24px;
        position: relative;
        z-index: 2;
        min-height: 0;
        overflow-y: auto;
      }
      /* Vertically centres the whole group (art + history row, then the meta block). */
      .stage-wrap {
        margin: auto 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(14px, 2vh, 30px);
        max-width: 100%;
      }
      .stage {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 34px;
        max-width: 100%;
      }
      .now-playing {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }
      #art-card {
        position: relative;
        flex-shrink: 0;
        width: min(40vmin, 32vh, 400px);
        height: min(40vmin, 32vh, 400px);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 40px 90px -28px rgba(0, 0, 0, 0.65),
          0 0 0 1px var(--panel-border);
        transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.42s ease;
      }
      .art-placeholder {
        position: absolute;
        inset: 0;
        background: radial-gradient(110% 110% at 28% 18%, var(--c1) 0%, rgba(0, 0, 0, 0) 55%),
          radial-gradient(120% 120% at 82% 88%, var(--c2) 0%, rgba(0, 0, 0, 0) 58%),
          linear-gradient(135deg, var(--c1), var(--c2));
      }
      #playing-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .art-sheen {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.22),
          rgba(255, 255, 255, 0) 42%,
          rgba(0, 0, 0, 0.16)
        );
      }
      /* ---- Spinning vinyl record (while playing) ---- */
      /* The spin itself is driven in JS (see spinFrame) so it can ramp speed up/down
         and stop briefly during the song-change flip. */
      .record-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.5s ease;
        background:
          /* darken toward the rim like a record edge */
          radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 0.32) 100%),
          /* fine concentric grooves */
          repeating-radial-gradient(
            circle at 50% 50%,
            rgba(0, 0, 0, 0.14) 0px, rgba(0, 0, 0, 0.14) 1px,
            rgba(255, 255, 255, 0.045) 1px, rgba(255, 255, 255, 0.045) 3px
          );
      }
      .record-overlay::before {
        /* centre label ring (the paper disc around the spindle) */
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 30%;
        height: 30%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.16);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2),
          0 0 0 1px rgba(0, 0, 0, 0.3);
      }
      .record-overlay::after {
        /* tiny solid black centre (spindle hole) */
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 14px;
        height: 14px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: #000;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.16);
      }
      /* With fx on, the record is always shown — it just sits still (and the arm
         parks to the side) while playback is paused, then spins up on play. */
      body:not(.no-bg-animation) #art-card { border-radius: 50%; }
      body:not(.no-bg-animation) .record-overlay { opacity: 1; }

      /* ---- Tonearm: sweeps from the rim to the centre as the song progresses ---- */
      /* Pivot sits just off the top-right of the disc at (100%, 2%) of the card.
         The arm is drawn in its rest pose (stylus on the outer rim); JS rotates the
         whole assembly about the pivot from 0deg → ~29.3deg as playback progresses
         (stopping just shy of the centre, like a real record's runout). */
      #playing-link { position: relative; }
      .tonearm {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        opacity: 0;
        transform-origin: 100% 2%;
        /* Rest pose = parked off to the side (matches TONEARM_PARK_DEG), so on load
           the arm is already out rather than swinging out from the rim. */
        transform: rotate(-10deg);
        transition: opacity 0.5s ease, transform 0.5s linear;
      }
      body:not(.no-bg-animation) .tonearm.ready { opacity: 1; }
      .tonearm-arm,
      .tonearm-cw,
      .tonearm-pivot,
      .tonearm-head { position: absolute; left: 100%; top: 2%; }
      .tonearm-arm {
        width: 65.31%; /* arm length R, as a fraction of the card */
        height: 5px;
        transform-origin: 0 50%;
        transform: translateY(-50%) rotate(94.52deg);
        background: linear-gradient(180deg, #ededf2, #a6a6ae);
        border-radius: 3px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.45);
      }
      .tonearm-cw {
        width: 16%;
        height: 9px;
        transform-origin: 0 50%;
        transform: translateY(-50%) rotate(274.52deg); /* opposite the arm */
        background: linear-gradient(180deg, #303036, #131316);
        border-radius: 5px;
      }
      .tonearm-cw::after {
        content: "";
        position: absolute;
        right: -7px;
        top: 50%;
        width: 17px;
        height: 17px;
        transform: translateY(-50%);
        border-radius: 50%;
        background: linear-gradient(145deg, #4a4a52, #18181c);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      }
      .tonearm-pivot {
        width: 9%;
        height: 9%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: linear-gradient(145deg, #3a3a40, #16161a);
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5),
          inset 0 1px 1px rgba(255, 255, 255, 0.18);
      }
      .tonearm-head {
        /* rest position = stylus on the outer rim (Q1) */
        left: 94.85%;
        top: 67.11%;
        width: 7%;
        height: 5%;
        transform: translate(-50%, -50%) rotate(94.52deg);
        background: linear-gradient(180deg, #2a2a30, #101014);
        border-radius: 3px;
        box-shadow: 0 3px 7px rgba(0, 0, 0, 0.55);
      }

      .eq-badge {
        position: absolute;
        left: 16px;
        bottom: 16px;
        display: none;
        align-items: flex-end;
        gap: 3px;
        height: 20px;
        padding: 7px 9px;
        border-radius: 11px;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
      }
      /* The spinning record now signals playback, so the corner EQ badge would
         only float in the empty space outside the disc — keep it hidden. */
      .eq-badge span {
        width: 3px;
        height: 100%;
        border-radius: 2px;
        background: #fff;
        transform-origin: bottom;
        animation: eqbar 0.9s ease-in-out infinite;
      }
      .eq-badge span:nth-child(2) { animation-delay: 0.28s; }
      .eq-badge span:nth-child(3) { animation-delay: 0.5s; }
      .eq-badge span:nth-child(4) { animation-delay: 0.15s; }

      .meta {
        text-align: center;
        max-width: min(92vw, 400px);
      }
      .now-playing { min-width: 0; }
      .div-playing-title {
        font-size: clamp(24px, 3.4vw, 34px);
        font-weight: 700;
        letter-spacing: -0.022em;
        line-height: 1.1;
        min-height: 1.1em;
      }
      .div-playing-title a { color: inherit; text-decoration: none; }
      .div-playing-artist {
        font-size: clamp(15px, 1.8vw, 19px);
        color: var(--muted);
        margin-top: 9px;
        font-weight: 500;
        min-height: 1em;
      }
      .div-playing-artist a { color: inherit; text-decoration: none; }
      .live-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
      }
      .live-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff4d4f;
        animation: livedot 1.7s ease-in-out infinite;
      }

      /* ---- Control dock ---- */
      .dock {
        position: relative;
        /* Lift the dock with margin, NOT `top`: an offset via `top` makes iOS Safari
           paint the play button's box-shadow glow at the un-offset position, leaving
           the glow detached from the button. Negative margin moves the real box. */
        margin-top: -7vh;
        z-index: 3;
        padding: 0 20px 14px;
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .dock-buttons {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .ctrl-btn {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--panel-border);
        background: var(--elev);
        color: var(--fg);
        cursor: pointer;
        backdrop-filter: blur(20px);
        transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
          background 0.3s, color 0.3s, opacity 0.3s;
      }
      .ctrl-btn:hover { transform: scale(1.08); }
      .ctrl-btn:active { transform: scale(0.92); }
      .ctrl-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }
      .ctrl-btn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      .play-btn {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 14px 40px -8px var(--accent-glow);
        transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
          box-shadow 0.4s, background 0.5s;
      }
      .play-btn:hover { transform: scale(1.05); }
      .play-btn:active { transform: scale(0.94); }

      .volume-row {
        display: flex;
        align-items: center;
        gap: 13px;
        width: min(420px, 82vw);
        color: var(--muted);
      }
      .vol-track {
        position: relative;
        flex: 1;
        height: 6px;
        border-radius: 4px;
        background: var(--elev);
        cursor: pointer;
        touch-action: none;
      }
      .vol-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 50%;
        border-radius: 4px;
        background: var(--accent);
        transition: background 0.5s;
      }
      .vol-thumb {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 2px 9px rgba(0, 0, 0, 0.45);
        transform: translate(-50%, -50%);
        transition: transform 0.15s;
      }

      /* ---- Footer ---- */
      footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 0 20px 14px;
        padding-bottom: max(14px, env(safe-area-inset-bottom));
        font-size: 12px;
        color: var(--muted);
        z-index: 2;
        position: relative;
        flex-wrap: wrap;
      }
      footer a {
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      footer a:hover { color: var(--fg); }
      footer .sep { opacity: 0.4; }

      /* ---- Toast ---- */
      .toast {
        position: fixed;
        top: max(78px, calc(env(safe-area-inset-top) + 62px));
        left: 50%;
        z-index: 60;
        transform: translateX(-50%);
        padding: 13px 22px;
        border-radius: 14px;
        background: var(--modal-surface);
        border: 1px solid var(--panel-border);
        box-shadow: 0 18px 50px -12px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(24px);
        font-size: 14px;
        font-weight: 500;
        display: none;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
        color: var(--fg);
      }
      .toast.show {
        display: flex;
        animation: toastpop 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      /* ---- Modals ---- */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
      }
      .modal-overlay.show {
        display: flex;
        animation: fadein 0.25s ease both;
      }
      .modal-card {
        width: min(540px, 100%);
        max-height: 86vh;
        display: flex;
        flex-direction: column;
        border-radius: 24px;
        background: var(--modal-surface);
        border: 1px solid var(--panel-border);
        box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(40px);
        overflow: hidden;
        animation: modalpop 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        color: var(--fg);
      }
      .modal-card.narrow { width: min(420px, 100%); }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 24px 16px;
      }
      .modal-head h2 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .modal-close {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: var(--elev);
        color: var(--fg);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .modal-close:hover { background: var(--panel-border); }
      .field {
        height: 46px;
        padding: 0 16px;
        border-radius: 13px;
        border: 1px solid var(--panel-border);
        background: var(--elev);
        color: var(--fg);
        font-size: 15px;
        outline: none;
        width: 100%;
      }
      .field::placeholder { color: var(--muted); }
      .search-wrap { position: relative; }
      .search-wrap svg {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
      }
      .search-wrap .field { padding-left: 44px; }

      .results {
        flex: 1;
        overflow-y: auto;
        padding: 10px 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-height: 120px;
      }
      .result-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 12px;
        border-radius: 13px;
        cursor: pointer;
        transition: background 0.18s;
      }
      .result-item:hover { background: var(--elev); }
      .result-art {
        width: 46px;
        height: 46px;
        border-radius: 9px;
        flex-shrink: 0;
        object-fit: cover;
        background: linear-gradient(135deg, var(--c1), var(--c2));
        box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.5);
      }
      .result-text { flex: 1; min-width: 0; }
      .result-title {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .result-artist {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .results-msg {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        padding: 30px 12px;
      }

      .modal-body-center { padding: 28px 28px 8px; text-align: center; }
      #confirm-song-image {
        width: 150px;
        height: 150px;
        border-radius: 20px;
        margin: 0 auto;
        object-fit: cover;
        display: block;
        box-shadow: 0 20px 50px -16px rgba(0, 0, 0, 0.6);
      }
      .confirm-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-top: 22px;
      }
      .confirm-artist { font-size: 15px; color: var(--muted); margin-top: 5px; }
      .confirm-prompt { font-size: 14px; color: var(--muted); margin-top: 18px; }

      const audioStream = document.getElementById("audio-stream");
      const buttonToggle = document.getElementById("button-toggle");
      const playingImage = document.getElementById("playing-image");
      const playingLink = document.getElementById("playing-link");
      let isPlaying = false;
      let pollInterval = null;
      let lastVotedSongId = null;
      let mutedSongId = null;
      let songId = null;
      let selectedSongData = null;
      let hlsFailed = false;
      let hlsInstance = null;

      // Display-only mode: index.html?display — strip controls/footer, force dark
      // theme + effects on, and autoplay. Used for unattended screens/kiosks.
      const DISPLAY_MODE = /[?&]display\b/i.test(location.search);
      if (DISPLAY_MODE) document.body.classList.add("display-mode");

      // Enhanced background effects globals
      let audioContext = null;
      let analyser = null;
      let audioSource = null;

      // Visualizer globals
      let vizCanvas, vizCtx, vizRafId;
      let currentRgbColors = { r: 80, g: 80, b: 80 };
      let presenceRgbColors = { r: 80, g: 80, b: 80 };
      let smoothedBass = 0;
      let smoothedMid = 0;
      let gainNode = null;
      let currentGain = 1.0;

      // Background canvas globals
      let bgCanvas, bgCtx, bgRafId, bgLastTime = 0;
      let bgColorCurr = { r: 20, g: 20, b: 20 };
      let bgColorTarget = { r: 20, g: 20, b: 20 };
      // New palette waiting to be applied — held until the record actually swaps to
      // the new cover, so the background / side glow never change colour beforehand.
      let pendingColors = null;
      let presenceColorCurr = { r: 20, g: 20, b: 20 };
      let presenceColorTarget = { r: 20, g: 20, b: 20 };

      // Tonearm progress globals — drive the arm from the rim to the centre
      const TONEARM_SWEEP_DEG = 29.32; // rim → just before centre (runout, ~15% radius)
      const TONEARM_PARK_DEG = -10;    // swung off the side of the record (rest)
      let songStartedAtMs = null;
      let songDurationMs = null;
      let tonearmSongId = null; // song the arm timing is locked to (ignore resends)
      let tonearmChoreography = false; // true while the scripted swing-off/on is running
      function updateTonearm() {
        const el = document.getElementById("tonearm");
        if (!el) return;
        if (songStartedAtMs == null || !songDurationMs) {
          el.classList.remove("ready");
          return;
        }
        el.classList.add("ready");
        if (tonearmChoreography) return; // scripted swing in progress — don't fight it
        if (!isPlaying) {
          // Paused — park the arm off to the side; it swings into place on play.
          el.style.transform = `rotate(${TONEARM_PARK_DEG}deg)`;
          return;
        }
        let p = (Date.now() - songStartedAtMs) / songDurationMs;
        p = p < 0 ? 0 : p > 1 ? 1 : p;
        el.style.transform = `rotate(${(p * TONEARM_SWEEP_DEG).toFixed(2)}deg)`;
      }
      setInterval(updateTonearm, 500);

      // ---- Record spin engine (JS-driven so speed can ramp up/down and stop) ----
      const SPIN_FULL = 360 / 8000; // deg per ms → one revolution every 8s
      const EASE_OUT = (x) => 1 - (1 - x) * (1 - x); // decelerate into a stop
      const EASE_IN = (x) => x * x; // accelerate from a stop
      let spinEls = null;
      let spinAngle = 0, spinSpeed = 0, spinRaf = null, spinPrev = 0;
      let spinRampFrom = 0, spinRampTo = 0, spinRampStart = 0, spinRampDur = 0, spinRampEase = EASE_OUT;
      function fxOn() {
        return !document.body.classList.contains("no-bg-animation");
      }
      function startSpinRamp(to, dur, ease) {
        spinRampFrom = spinSpeed;
        spinRampTo = to;
        spinRampStart = performance.now();
        spinRampDur = dur;
        spinRampEase = ease;
        // Run the loop whenever effects are on, so the record keeps turning as it
        // decelerates to a stop even after playback has been paused.
        if (!spinRaf && fxOn()) { spinPrev = 0; spinRaf = requestAnimationFrame(spinFrame); }
      }
      function spinFrame(t) {
        if (!fxOn()) {
          // Effects off — square-mode art must sit upright; clear rotation and stop.
          spinRaf = null; spinSpeed = 0; spinRampDur = 0;
          if (spinEls) spinEls.forEach((el) => (el.style.transform = ""));
          return;
        }
        const dt = spinPrev ? Math.min(t - spinPrev, 50) : 16;
        spinPrev = t;
        if (spinRampDur > 0) {
          const e = Math.min(1, (t - spinRampStart) / spinRampDur);
          spinSpeed = spinRampFrom + (spinRampTo - spinRampFrom) * spinRampEase(e);
          if (e >= 1) spinRampDur = 0; // hold final speed
        }
        spinAngle = (spinAngle + spinSpeed * dt) % 360;
        if (spinEls) spinEls.forEach((el) => (el.style.transform = `rotate(${spinAngle}deg)`));
        // Keep animating while spinning or still ramping. Once fully at rest, stop
        // the loop and leave the record at its current angle — no snap to upright.
        if (spinSpeed > 0 || spinRampDur > 0) {
          spinRaf = requestAnimationFrame(spinFrame);
        } else {
          spinRaf = null;
        }
      }
      function ensureSpin() {
        if (!spinEls) {
          spinEls = [
            document.getElementById("playing-image"),
            document.querySelector(".art-placeholder"),
          ].filter(Boolean);
        }
        if (tonearmChoreography) return; // song-change sequence is driving the spin
        if (!fxOn()) {
          // Effects off — clear to upright (now if idle, else on the next frame).
          if (spinRaf) spinPrev = 0;
          else if (spinEls) spinEls.forEach((el) => (el.style.transform = ""));
        } else if (document.body.classList.contains("is-playing")) {
          // Playing — spin up to full speed from wherever the record is resting.
          if (spinSpeed < SPIN_FULL) startSpinRamp(SPIN_FULL, 700, EASE_IN);
        } else if (spinSpeed > 0 || spinRaf) {
          // Paused — ease the record to a stop, leaving it where it lands.
          startSpinRamp(0, 1500, EASE_OUT);
        }
      }

      // Background transition globals
      let bgTransActive = false;
      let bgTransStartTime = 0;
      const BG_TRANS_DURATION = 900;
      let bgTransOldCanvas = null;
      let bgHasBeenSet = false;
      let pendingMetadata = null;       // { data, imgSrc } waiting for reveal point
      let pendingMetadataApplied = false;
      let lastDisplayedSongId = null;   // currently shown song, for change detection
      const BG_TRANS_REVEAL = 0.04;     // progress at which new colour has just blipped out from centre
      let bgTransBlobOffsets = [];      // random radii offsets for the organic blob shape

      function generateUUID() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(
          /[xy]/g,
          function (c) {
            var r = (Math.random() * 16) | 0,
              v = c == "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          }
        );
      }

      function getOrCreateUUID() {
        let uuid = storageGet("userUUID");
        if (!uuid) {
          uuid = generateUUID();
          storageSet("userUUID", uuid);
        }
        return uuid;
      }

      function storageSet(key, value) {
        localStorage.setItem(key, value);
      }

      function storageGet(key) {
        return localStorage.getItem(key);
      }

      // --- Theme ---
      function applyTheme(theme) {
        document.body.classList.toggle("theme-dark", theme === "dark");
        document.body.classList.toggle("theme-light", theme === "light");
        document.querySelector(".theme-icon-dark").style.display =
          theme === "dark" ? "" : "none";
        document.querySelector(".theme-icon-light").style.display =
          theme === "light" ? "" : "none";
      }

      function toggleTheme() {
        const next = document.body.classList.contains("theme-dark")
          ? "light"
          : "dark";
        applyTheme(next);
        storageSet("ms_theme", next);
      }

      (function initTheme() {
        if (DISPLAY_MODE) { applyTheme("dark"); return; }
        let theme = storageGet("ms_theme");
        if (!theme) {
          theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        }
        applyTheme(theme);
      })();

      function updateButtons() {
        const voteSkipBtn = document.getElementById("voteSkipBtn");
        const muteSongBtn = document.getElementById("muteSongBtn");

        if (isPlaying) {
          voteSkipBtn.disabled = songId === lastVotedSongId || !songId;
          muteSongBtn.disabled = false;
        } else {
          voteSkipBtn.disabled = true;
          muteSongBtn.disabled = true;
        }
        // Mute icon + active highlight
        const muted = audioStream.muted;
        muteSongBtn.classList.toggle("active", muted && isPlaying);
        muteSongBtn.querySelector(".mute-icon-on").style.display = muted ? "none" : "";
        muteSongBtn.querySelector(".mute-icon-off").style.display = muted ? "" : "none";
      }

      function updatePlayUI() {
        buttonToggle.querySelector(".play-icon").style.display = isPlaying ? "none" : "";
        buttonToggle.querySelector(".stop-icon").style.display = isPlaying ? "" : "none";
        buttonToggle.title = isPlaying ? "Stop" : "Play";
        document.body.classList.toggle("is-playing", isPlaying);
        ensureSpin();
        updateTonearm(); // swing the arm in on play / park it on pause, immediately
      }

      function onPlayClick() {
        if (isPlaying) buttonStop();
        else togglePlay();
      }

      function enableConfirmButton(token) {
        document.getElementById("confirmRequestBtn").disabled = false;
        document.getElementById("confirmRequestBtn").dataset.turnstileToken = token;
      }

      function enableVoteSkipButton(token) {
        const button = document.getElementById("confirmVoteSkipBtn");
        if (button) {
          button.disabled = false;
          button.dataset.turnstileToken = token;
        }
      }

      function pollServer() {
        if (!isPlaying) return;

        const listenerName = storageGet("requesterName") || "";
        const userUUID = getOrCreateUUID();

        const volume = parseInt(storageGet("volume") ?? "50", 10);
        fetch("/api/listener", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uuid: userUUID, name: listenerName, volume }),
        }).catch((error) => console.error("Error polling server:", error));
      }

      function startPolling() {
        if (!pollInterval) {
          pollInterval = setInterval(pollServer, 30000); // Poll every 30 seconds
          pollServer(); // Poll immediately
        }
      }

      function stopPolling() {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
      }

      function fallbackToIcecast() {
        console.log("Using Icecast fallback stream");
        audioStream.pause();
        audioStream.removeAttribute('src');
        audioStream.load();
        audioStream.src = "https://icecast.sjh.at/spotifynet";
        audioStream.play().catch(function(e) { console.warn("Icecast play failed:", e); });
      }

      function icecastFallbackHandler() {
        console.warn("Native HLS error, falling back to Icecast");
        hlsFailed = true;
        fallbackToIcecast();
      }

      function scaleVolume(inputValue) {
        return inputValue <= 50
          ? inputValue * 0.2
          : 10 + (inputValue - 50) * 0.4;
      }

      function qualityUpdate() {
        // Clean up previous HLS instance
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        const nativeHls = audioStream.canPlayType("application/vnd.apple.mpegurl");

        if (!hlsFailed && nativeHls && !fxOn()) {
          // With effects off we don't need the Web Audio analyser, so prefer the
          // browser's native HLS — it's hardware-accelerated and far lighter on the
          // CPU than hls.js's software MSE pipeline (which makes phones stutter).
          audioStream.src = "https://hls.sjh.at/spotifynet/stream.m3u8";
          audioStream.addEventListener("error", icecastFallbackHandler, { once: true });
          audioStream.play().catch(function(e) {});
        } else if (!hlsFailed && Hls.isSupported()) {
          // Effects on: use hls.js so the analyser gets a clean, decodable signal.
          hlsInstance = new Hls();
          hlsInstance.loadSource("https://hls.sjh.at/spotifynet/stream.m3u8");
          hlsInstance.attachMedia(audioStream);

          hlsInstance.once(Hls.Events.MANIFEST_PARSED, function() {
            audioStream.play().catch(function(e) { console.warn("HLS play failed:", e); });
          });

          hlsInstance.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
              console.warn("HLS fatal error, falling back to Icecast", data);
              hlsFailed = true;
              hlsInstance.destroy();
              hlsInstance = null;
              fallbackToIcecast();
            }
          });
        } else if (!hlsFailed && nativeHls) {
          audioStream.src = "https://hls.sjh.at/spotifynet/stream.m3u8";
          audioStream.addEventListener("error", icecastFallbackHandler, { once: true });
          audioStream.play().catch(function(e) {});
        } else {
          fallbackToIcecast();
        }
      }

      // --- Enhanced Background Effects ---

      function initAudioContext() {
        if (audioContext) return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.4;
        analyser.minDecibels = -60;  // raise floor — cuts dead silence, spreads compressed signal
        analyser.maxDecibels = -5;   // near 0dBFS peak for compressed/loudness-war tracks
        gainNode = audioContext.createGain();
        gainNode.gain.value = currentGain;
      }

      function connectAudioSource() {
        if (!audioContext || audioSource) return;
        try {
          audioSource = audioContext.createMediaElementSource(audioStream);
          // analyser taps the full-amplitude signal; gainNode controls output volume
          audioSource.connect(analyser);
          analyser.connect(gainNode);
          gainNode.connect(audioContext.destination);
          audioStream.volume = 1.0;
          console.log('[DEBUG] Audio source connected, audioContext state:', audioContext.state);
        } catch (e) {
          console.warn('Audio source connection failed:', e);
        }
      }


      // --- Background Canvas ---

      function initBgCanvas() {
        bgCanvas = document.getElementById('bg-canvas');
        bgCtx = bgCanvas.getContext('2d');
        resizeBgCanvas();
        window.addEventListener('resize', resizeBgCanvas);
      }

      function resizeBgCanvas() {
        if (!bgCanvas) return;
        bgCanvas.width = Math.max(1, Math.floor(window.innerWidth / 8));
        bgCanvas.height = Math.max(1, Math.floor(window.innerHeight / 8));
        // Cancel any in-progress transition — snapshot size is now wrong
        if (bgTransActive) {
          bgTransActive = false;
          bgTransOldCanvas = null;
          bgCanvas.style.transform = '';
        }
      }

      function startBg() {
        if (bgRafId || document.body.classList.contains('no-bg-animation')) return;
        drawBgLoop();
      }

      function stopBg() {
        if (bgRafId) {
          cancelAnimationFrame(bgRafId);
          bgRafId = null;
        }
        if (bgCtx) bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      }

      function drawBgLoop(timestamp) {
        bgRafId = requestAnimationFrame(drawBgLoop);
        if (timestamp - bgLastTime < VIZ_INTERVAL) return;
        bgLastTime = timestamp;

        // Lerp toward target colors
        bgColorCurr.r += (bgColorTarget.r - bgColorCurr.r) * 0.06;
        bgColorCurr.g += (bgColorTarget.g - bgColorCurr.g) * 0.06;
        bgColorCurr.b += (bgColorTarget.b - bgColorCurr.b) * 0.06;
        presenceColorCurr.r += (presenceColorTarget.r - presenceColorCurr.r) * 0.06;
        presenceColorCurr.g += (presenceColorTarget.g - presenceColorCurr.g) * 0.06;
        presenceColorCurr.b += (presenceColorTarget.b - presenceColorCurr.b) * 0.06;

        const W = bgCanvas.width, H = bgCanvas.height;
        const { cx, cy } = bgGlowCenter();
        const scale = 1 + smoothedBass * 0.65;

        // Light mode: deepen the colours and push opacity so glows read against the bright bg
        const light = document.body.classList.contains('theme-light');
        const aMul = light ? 2.0 : 1;
        const deepen = (v) => light ? Math.round(v * 0.55) : v;
        const r = deepen(bgColorCurr.r), g = deepen(bgColorCurr.g), b = deepen(bgColorCurr.b);
        const pr = deepen(presenceColorCurr.r), pg = deepen(presenceColorCurr.g), pb = deepen(presenceColorCurr.b);

        bgCtx.clearRect(0, 0, W, H);

        // Main centered glow
        const maxR = Math.max(W, H) * 0.3 * scale;
        const grd = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
        grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${(0.1 + smoothedBass * 0.7) * aMul})`);
        grd.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${(0.03 + smoothedBass * 0.2) * aMul})`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd;
        bgCtx.fillRect(0, 0, W, H);

        // Offset secondary glows — presence colour for visual separation
        const grd2 = bgCtx.createRadialGradient(W * 0.25, H * 0.25, 0, W * 0.25, H * 0.25, maxR * 0.5);
        grd2.addColorStop(0, `rgba(${pr}, ${pg}, ${pb}, ${(0.04 + smoothedMid * 0.25) * aMul})`);
        grd2.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd2;
        bgCtx.fillRect(0, 0, W, H);

        const grd3 = bgCtx.createRadialGradient(W * 0.75, H * 0.75, 0, W * 0.75, H * 0.75, maxR * 0.5);
        grd3.addColorStop(0, `rgba(${pr}, ${pg}, ${pb}, ${(0.03 + smoothedMid * 0.2) * aMul})`);
        grd3.addColorStop(1, 'rgba(0,0,0,0)');
        bgCtx.fillStyle = grd3;
        bgCtx.fillRect(0, 0, W, H);

        // Draw transition overlay on top of new background
        if (bgTransActive && timestamp) {
          const elapsed = timestamp - bgTransStartTime;
          const rawProgress = Math.min(1, elapsed / BG_TRANS_DURATION);
          drawBgTransition(rawProgress);
          if (rawProgress >= 1) {
            bgTransActive = false;
            bgTransOldCanvas = null;
            bgCanvas.style.transform = '';
          }
        }
      }

      function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      }

      // Centre point for the background glow / wipe, aligned vertically with the album art
      function bgGlowCenter() {
        const W = bgCanvas.width, H = bgCanvas.height;
        let cy = H / 2;
        const card = document.getElementById('art-card');
        if (card) {
          const rect = card.getBoundingClientRect();
          if (rect.height) cy = ((rect.top + rect.height / 2) / window.innerHeight) * H;
        }
        return { cx: W / 2, cy };
      }

      function drawBgTransition(rawProgress) {
        if (!bgTransOldCanvas) return;
        const p = easeInOut(rawProgress);
        const W = bgCanvas.width, H = bgCanvas.height;

        // Organic blob wipe: new colour expands outward from centre as an irregular blob.
        // Old colour is drawn everywhere EXCEPT inside the growing blob (even-odd clip).
        const { cx, cy } = bgGlowCenter();
        const cornerR = Math.sqrt(cx * cx + Math.max(cy, H - cy) ** 2);
        const baseR = cornerR * 1.55;
        const N = bgTransBlobOffsets.length;
        const scale = baseR * p; // grows from 0 outward

        // Compute blob vertices (polar, uneven radii)
        const pts = bgTransBlobOffsets.map((off, i) => {
          const angle = (2 * Math.PI * i / N) - Math.PI / 2;
          const r = scale * (1 + off);
          return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
        });

        // Even-odd clip: full canvas rect + blob path = old image drawn only OUTSIDE the blob
        bgCtx.save();
        bgCtx.beginPath();
        bgCtx.rect(0, 0, W, H); // outer boundary
        const startMid = { x: (pts[N - 1].x + pts[0].x) / 2, y: (pts[N - 1].y + pts[0].y) / 2 };
        bgCtx.moveTo(startMid.x, startMid.y);
        for (let i = 0; i < N; i++) {
          const a = pts[i], b = pts[(i + 1) % N];
          bgCtx.quadraticCurveTo(a.x, a.y, (a.x + b.x) / 2, (a.y + b.y) / 2);
        }
        bgCtx.closePath();
        bgCtx.clip('evenodd');
        bgCtx.drawImage(bgTransOldCanvas, 0, 0);
        bgCtx.restore();

        // When the wipe reaches the centre, trigger the metadata swap
        if (rawProgress >= BG_TRANS_REVEAL && !pendingMetadataApplied) {
          pendingMetadataApplied = true;
          applyPendingMetadata();
        }
      }

      function triggerBgTransition() {
        if (!bgHasBeenSet) {
          bgHasBeenSet = true;
          return; // no transition on first load — apply metadata immediately instead
        }
        if (document.body.classList.contains('no-bg-animation')) {
          return; // animation loop isn't running, skip transition so metadata applies immediately
        }
        const snap = document.createElement('canvas');
        snap.width = bgCanvas.width;
        snap.height = bgCanvas.height;
        snap.getContext('2d').drawImage(bgCanvas, 0, 0);
        bgTransOldCanvas = snap;
        bgTransStartTime = performance.now();
        bgTransActive = true;
        pendingMetadataApplied = false;
        // Generate a fresh random blob shape for this transition (12 points, ±35% radius variation)
        bgTransBlobOffsets = Array.from({ length: 12 }, () => (Math.random() - 0.5) * 0.7);
      }

      function applyPendingMetadata() {
        if (!pendingMetadata) return;
        const { data, imgSrc } = pendingMetadata;
        pendingMetadata = null;

        const createLink = (url, id, name) =>
          `<a href="${url}${id}" target="_blank" style="color: inherit; text-decoration: none;">${name}</a>`;

        const cardEl   = document.getElementById('art-card');
        const titleEl  = document.querySelector('.div-playing-title');
        const artistEl = document.querySelector('.div-playing-artist');

        const isChange = lastDisplayedSongId !== null && lastDisplayedSongId !== data.songid;
        lastDisplayedSongId = data.songid;

        const applyContent = () => {
          // Swap the cover and the colour palette together — at this point the
          // background + side glow are dimmed, so the colour change isn't visible
          // until they fade back in as the record spins up.
          applyPendingColors();
          playingImage.src = imgSrc;
          titleEl.innerHTML  = createLink('https://open.spotify.com/track/', data.songid, data.song);
          artistEl.innerHTML = data.artist
            .map((a) => createLink('https://open.spotify.com/artist/', a.id, a.name))
            .join(', ');
          playingLink.setAttribute('href', `https://open.spotify.com/album/${data.albumid}`);
          // Only (re)sync the arm on an actual song change — resends of the same
          // song carry a fresh started_at and would otherwise jump the arm back.
          if (data.songid !== tonearmSongId) {
            tonearmSongId = data.songid;
            const startMs = data.started_at ? Date.parse(data.started_at) : NaN;
            songStartedAtMs = isNaN(startMs) ? null : startMs;
            songDurationMs = data.duration_ms || null;
          }
          updateTonearm();
          if ('mediaSession' in navigator && data.song) {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: data.song,
              artist: data.artist.map((a) => a.name).join(', '),
              album: data.albumid,
              artwork: [{ src: imgSrc, sizes: '250x250', type: 'image/jpeg' }],
            });
          }
        };

        if (!isChange) {
          applyContent();
          return;
        }

        const armEl = document.getElementById('tonearm');

        // Lightweight mode: no record/arm — just cross-fade the art + text.
        if (document.body.classList.contains('no-bg-animation')) {
          cardEl.classList.add('fade-swap');
          titleEl.classList.add('fade-swap-text');
          artistEl.classList.add('fade-swap-text');
          setTimeout(applyContent, 600);
          setTimeout(() => {
            cardEl.classList.remove('fade-swap');
            titleEl.classList.remove('fade-swap-text');
            artistEl.classList.remove('fade-swap-text');
          }, 1200);
          return;
        }

        // Full turntable sequence:
        //   1. arm swings back off the side of the record
        //   2. the record flips, swapping to the new cover while edge-on
        //   3. arm drops back onto the rim to start the new song
        const LEAD_MS = 700;  // let the record spin down a bit before the arm moves
        const SWING_MS = 1000;
        tonearmChoreography = true;
        // Song's about to end — fade out the background + side glow as the record spins down.
        document.body.classList.add('fx-dimmed');
        // Record eases to a stop first, finishing right as the arm parks / flip begins.
        startSpinRamp(0, LEAD_MS + SWING_MS, EASE_OUT);

        setTimeout(() => {
          // Arm swings off the side of the record.
          if (armEl) {
            armEl.style.transition = 'transform 1s ease, opacity 1s ease';
            armEl.style.transform = `rotate(${TONEARM_PARK_DEG}deg)`;
          }
          setTimeout(() => {
            cardEl.classList.add('flip-swap');
            titleEl.classList.add('fade-swap-text');
            artistEl.classList.add('fade-swap-text');
            setTimeout(applyContent, 600); // swap at the edge-on (invisible) point
            setTimeout(() => {
              cardEl.classList.remove('flip-swap');
              titleEl.classList.remove('fade-swap-text');
              artistEl.classList.remove('fade-swap-text');
              // Flip done — drop the arm back onto the rim and spin back up to speed
              // (only if actually playing; a paused record stays at rest).
              if (armEl) armEl.style.transform = 'rotate(0deg)';
              startSpinRamp(isPlaying ? SPIN_FULL : 0, 1400, EASE_IN);
              // Record's spinning again — bring the background + side glow back.
              document.body.classList.remove('fx-dimmed');
              setTimeout(() => {
                if (armEl) armEl.style.transition = ''; // restore play-time (linear) transition
                tonearmChoreography = false;
              }, SWING_MS);
            }, 1200);
          }, SWING_MS);
        }, LEAD_MS);
      }

      // --- End Background Canvas ---

      // --- Audio Visualizer ---

      function initVizCanvas() {
        vizCanvas = document.getElementById('viz-canvas');
        vizCtx = vizCanvas.getContext('2d');
        resizeVizCanvas();
        window.addEventListener('resize', resizeVizCanvas);
      }

      function resizeVizCanvas() {
        if (!vizCanvas) return;
        // Render at 1/5 resolution — soft glows are indistinguishable, massive GPU savings
        vizCanvas.width = Math.floor(window.innerWidth / 5);
        vizCanvas.height = Math.floor(window.innerHeight / 5);
      }

      function startViz() {
        if (vizRafId || document.body.classList.contains('no-bg-animation')) return;
        vizCanvas.style.opacity = '1';
        drawViz();
      }

      function stopViz() {
        if (vizRafId) {
          cancelAnimationFrame(vizRafId);
          vizRafId = null;
        }
        if (vizCanvas) {
          vizCanvas.style.opacity = '0';
          setTimeout(() => {
            if (vizCtx && !vizRafId) vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
          }, 1500);
        }
        smoothedBass = 0;
        smoothedMid = 0;
        vizLastTime = 0;
      }

      const VIZ_FPS = 60;
      const VIZ_INTERVAL = 1000 / VIZ_FPS;
      let vizLastTime = 0;

      function drawViz(timestamp) {
        vizRafId = requestAnimationFrame(drawViz);
        if (!analyser) return;
        if (timestamp - vizLastTime < VIZ_INTERVAL) return;
        vizLastTime = timestamp;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        const W = vizCanvas.width;
        const H = vizCanvas.height;
        const cx = W / 2;
        const cy = H / 2;

        // Hz-accurate bin ranges based on actual sample rate
        const nyquist = audioContext.sampleRate / 2;
        const hzPerBin = nyquist / bufferLength;

        // Bass 30–400 Hz
        const bassStart = Math.max(1, Math.round(30 / hzPerBin));
        const bassEnd = Math.max(bassStart + 1, Math.round(400 / hzPerBin));
        let bass = 0;
        for (let i = bassStart; i <= bassEnd; i++) bass += dataArray[i];
        bass = Math.pow(bass / (bassEnd - bassStart + 1) / 255, 0.55);
        smoothedBass += (bass - smoothedBass) * 0.2;

        // Vocal presence 1500–3500 Hz
        const presStart = Math.round(1500 / hzPerBin);
        const presEnd = Math.min(bufferLength - 1, Math.round(3500 / hzPerBin));
        let mid = 0;
        for (let i = presStart; i <= presEnd; i++) mid += dataArray[i];
        mid = Math.pow(mid / (presEnd - presStart + 1) / 255, 0.55);
        smoothedMid += (mid - smoothedMid) * 0.16;

        vizCtx.clearRect(0, 0, W, H);

        // Light mode: deepen colours and push opacity so glows read against the bright bg
        const light = document.body.classList.contains('theme-light');
        const aMul = light ? 2.0 : 1;
        const deepen = (v) => light ? Math.round(v * 0.55) : v;
        const r = deepen(currentRgbColors.r), g = deepen(currentRgbColors.g), b = deepen(currentRgbColors.b);
        const minDim = Math.min(W, H);

        // Center bass glow — large and punchy
        if (smoothedBass > 0.02) {
          const glowR = minDim * 0.06 + smoothedBass * minDim * 0.22;
          const grd = vizCtx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
          grd.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${smoothedBass * 0.75 * aMul})`);
          grd.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${smoothedBass * 0.25 * aMul})`);
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          vizCtx.beginPath();
          vizCtx.arc(cx, cy, glowR, 0, Math.PI * 2);
          vizCtx.fillStyle = grd;
          vizCtx.fill();
        }

        // Edge bands driven by presence (1500–3500 Hz) — 1/8th inset on all sides
        if (smoothedMid > 0.01) {
          const pr = deepen(presenceRgbColors.r), pg = deepen(presenceRgbColors.g), pb = deepen(presenceRgbColors.b);
          const alpha = smoothedMid * 0.65 * aMul;
          const color = `rgba(${pr}, ${pg}, ${pb}, ${alpha})`;
          const clear = 'rgba(0,0,0,0)';

          vizCtx.save();
          vizCtx.beginPath();
          vizCtx.rect(0, 0, W, H);
          vizCtx.roundRect(W * 0.125, H * 0.125, W * 0.75, H * 0.75, Math.min(W, H) * 0.08);
          vizCtx.clip('evenodd');

          // Left
          const gradL = vizCtx.createLinearGradient(0, 0, W * 0.125, 0);
          gradL.addColorStop(0, color); gradL.addColorStop(1, clear);
          vizCtx.fillStyle = gradL;
          vizCtx.fillRect(0, 0, W * 0.125, H);

          // Right
          const gradR = vizCtx.createLinearGradient(W * 0.875, 0, W, 0);
          gradR.addColorStop(0, clear); gradR.addColorStop(1, color);
          vizCtx.fillStyle = gradR;
          vizCtx.fillRect(W * 0.875, 0, W * 0.125, H);

          vizCtx.restore();
        }
      }

      // --- End Audio Visualizer ---

      initBgCanvas();
      initVizCanvas();

      function togglePlay() {
        qualityUpdate();
        isPlaying = true;
        startPolling();
        updatePlayUI();
        updateButtons();

        // Only build the Web Audio graph when the visualizer actually needs it. With
        // effects off (most phones) the <audio> element plays natively — far lighter
        // on the CPU. Volume then runs through audioStream.volume (see volumeSet).
        if (fxOn()) enableAudioGraph();
      }

      // Lazily route the <audio> element through Web Audio (analyser + gain) for the
      // visualizer. Safe to call repeatedly — the underlying nodes are created once.
      function enableAudioGraph() {
        initAudioContext();
        connectAudioSource();
        if (audioContext.state === 'suspended') audioContext.resume();
        startViz();
      }

      function buttonStop() {
        audioStream.pause();
        audioStream.currentTime = 0;
        isPlaying = false;
        stopPolling();
        updatePlayUI();
        updateButtons();
        stopViz();
        // Don't leave the background dimmed if we stopped mid song-change.
        document.body.classList.remove('fx-dimmed');
      }

      function volumeSet(val) {
        const scaledVolume = scaleVolume(val);
        currentGain = scaledVolume / 100;
        if (gainNode) {
          gainNode.gain.value = currentGain;
        } else {
          audioStream.volume = currentGain;
        }
        storageSet("volume", val);
        setVolumeUI(val);
      }

      function setVolumeUI(val) {
        const fill = document.getElementById("vol-fill");
        const thumb = document.getElementById("vol-thumb");
        const pct = Math.max(0, Math.min(100, val));
        if (fill) fill.style.width = pct + "%";
        if (thumb) thumb.style.left = pct + "%";
      }

      // Custom volume slider drag
      (function initVolumeSlider() {
        const track = document.getElementById("vol-track");
        let dragging = false;

        function updateFromX(clientX) {
          const rect = track.getBoundingClientRect();
          let v = Math.round(((clientX - rect.left) / rect.width) * 100);
          v = Math.max(0, Math.min(100, v));
          volumeSet(v);
        }
        track.addEventListener("pointerdown", (e) => {
          dragging = true;
          track.setPointerCapture(e.pointerId);
          updateFromX(e.clientX);
        });
        track.addEventListener("pointermove", (e) => {
          if (dragging) updateFromX(e.clientX);
        });
        const end = () => { dragging = false; };
        track.addEventListener("pointerup", end);
        track.addEventListener("pointercancel", end);
      })();

      function preloadImage(url, callback) {
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        // Wait for a full decode (not just download) so the bitmap is warm in cache —
        // setting playingImage.src to the same URL then paints instantly without a flicker.
        const done = () => callback(img);
        img.onload = () => (img.decode ? img.decode().then(done, done) : done());
        img.onerror = done; // don't stall the swap on a broken cover
        img.src = url;
      }

      function handleMetadata(currentData) {
        if (!currentData || !currentData.song) {
          document
            .querySelectorAll(".div-playing-title, .div-playing-artist")
            .forEach((el) => (el.textContent = ""));
          if (
            playingImage.src !==
            "data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
          ) {
            playingImage.src =
              "data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";
          }
          playingLink.setAttribute("href", "javascript:void(0)");
          updateSongId(null);
          songStartedAtMs = null;
          songDurationMs = null;
          tonearmSongId = null;
          updateTonearm();
          return;
        }

        updateSongId(currentData.songid);

        if (playingImage.src !== currentData.cover) {
          // Preload new cover, extract colours, then kick off the wipe transition.
          // The DOM update (image + text) is deferred until the wipe reaches the centre.
          preloadImage(currentData.cover, function (img) {
            extractColors(img).then((colors) => {
              pendingMetadata = { data: currentData, imgSrc: currentData.cover };
              updateBackgroundColors(colors);
            });
          });
        } else {
          // Same cover — queue the text update through the transition too so timing is consistent
          pendingMetadata = { data: currentData, imgSrc: currentData.cover };
          if (bgTransActive) {
            // Let the running transition pick it up at the reveal point
            pendingMetadataApplied = false;
          } else {
            applyPendingMetadata();
          }
        }
      }

      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[c]));
      }

      let lastHistoryTopId = null;
      function renderHistory(history) {
        const panel = document.getElementById("history-panel");
        const list = document.getElementById("history-list");
        if (!panel || !list) return;

        const items = (history || []).slice(0, 4);
        panel.style.display = items.length ? "" : "none";

        const newTopId = items.length ? items[0].songid : null;
        const isNew = newTopId && newTopId !== lastHistoryTopId && lastHistoryTopId !== null;
        lastHistoryTopId = newTopId;

        list.innerHTML = items
          .map((it) => {
            const artists = (it.artist || []).map((a) => escapeHtml(a.name)).join(", ");
            return `<a class="history-item" href="https://open.spotify.com/track/${it.songid}" target="_blank">
              <img class="history-art" src="${it.cover}" alt="" />
              <div class="history-text">
                <div class="history-title">${escapeHtml(it.song)}</div>
                <div class="history-artist">${artists}</div>
              </div>
            </a>`;
          })
          .join("");

        // Animate the freshly added song shifting into the top of the list
        if (isNew && list.firstElementChild) {
          list.firstElementChild.classList.add("history-enter");
        }
      }

      function connectSSE() {
        const evtSource = new EventSource("/api/events");

        evtSource.addEventListener("metadata", (e) => {
          handleMetadata(JSON.parse(e.data));
        });

        evtSource.addEventListener("history", (e) => {
          renderHistory(JSON.parse(e.data).history);
        });

        evtSource.addEventListener("listeners", (e) => {
          const data = JSON.parse(e.data);
          document.getElementById("listener-count").textContent = data.count;
        });

        evtSource.addEventListener("skipvotes", (e) => {
          const data = JSON.parse(e.data);
          document.getElementById("vote-count").textContent = data.count;
          document.getElementById("votes-needed").textContent = data.needed;
          const fill = document.getElementById("vote-bar-fill");
          if (fill) {
            const pct = data.needed
              ? Math.min(100, Math.round((data.count / data.needed) * 100))
              : 0;
            fill.style.width = pct + "%";
          }
        });

        evtSource.onerror = () => {
          evtSource.close();
          setTimeout(connectSSE, 5000);
        };
