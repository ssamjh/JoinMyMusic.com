<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ssamjh's Music Sync</title>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  </head>
  <body class="theme-dark">
    <canvas id="color-canvas"></canvas>
    <canvas id="bg-canvas"></canvas>
    <canvas id="viz-canvas"></canvas>
    <div class="vignette"></div>

    <div class="app">
      <header>
        <div>
          <div class="brand-title">Music Sync</div>
          <div class="brand-sub">JoinMyMusic.com</div>
        </div>
        <div class="header-actions">
          <button id="bgToggleBtn" class="icon-btn" title="Toggle background effects" onclick="toggleBgAnimation()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="transform:translateX(-2px)"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z"></path><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"></path></svg>
          </button>
          <button id="themeToggleBtn" class="icon-btn" title="Toggle light/dark" onclick="toggleTheme()">
            <span class="theme-icon-dark">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 2.5v2M12 19.5v2M4.6 4.6l1.4 1.4M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4l1.4-1.4M18 6l1.4-1.4"></path></svg>
            </span>
            <span class="theme-icon-light" style="display:none">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4 6.3 6.3 0 0 0 20 14.5z"></path></svg>
            </span>
          </button>
        </div>
      </header>

      <main>
        <div class="stage-wrap">
        <div class="stage">
        <div class="now-playing">
          <a id="playing-link" target="_blank" style="display:block;">
            <div id="art-card">
              <div class="art-placeholder"></div>
              <img
                id="playing-image"
                crossorigin="anonymous"
                src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
                alt=""
                width="400"
                height="400" />
              <div class="record-overlay"></div>
              <div class="art-sheen"></div>
            </div>
            <div class="tonearm" id="tonearm" aria-hidden="true">
              <div class="tonearm-cw"></div>
              <div class="tonearm-arm"></div>
              <div class="tonearm-pivot"></div>
              <div class="tonearm-head"></div>
            </div>
          </a>
        </div>
        <aside class="history-panel" id="history-panel" style="display:none">
          <div class="history-head">Recently played</div>
          <div class="history-list" id="history-list"></div>
        </aside>
        </div>
        <div class="meta">
          <div class="div-playing-title"></div>
          <div class="div-playing-artist"></div>
          <div class="live-row">
            <span class="live-dot"></span>
            <span><span id="listener-count">0</span> listening now</span>
          </div>
        </div>
        </div>
      </main>

      <div class="dock">
        <div class="dock-buttons">
          <button class="ctrl-btn" title="Request a song" onclick="openRequestModal()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
          <button id="muteSongBtn" class="ctrl-btn" title="Mute until song ends" disabled>
            <span class="mute-icon-on">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5L5 8.5H2v7h3L9 19V5z"></path><circle cx="17.5" cy="7" r="4.3"></circle><path d="M17.5 4.9V7l1.5 1"></path></svg>
            </span>
            <span class="mute-icon-off" style="display:none">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5L5 8.5H2v7h3L9 19V5z"></path><line x1="11.5" y1="10" x2="16" y2="14.5"></line><line x1="16" y1="10" x2="11.5" y2="14.5"></line><circle cx="17.5" cy="7" r="4.3"></circle><path d="M17.5 4.9V7l1.5 1"></path></svg>
            </span>
          </button>
          <button id="button-toggle" class="play-btn" title="Play / Stop" onclick="onPlayClick()">
            <span class="play-icon">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.2v13.6c0 .9 1 1.4 1.7.9l10-6.8c.7-.5.7-1.4 0-1.9l-10-6.8C9 3.8 8 4.3 8 5.2z"></path></svg>
            </span>
            <span class="stop-icon" style="display:none">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.3"></rect><rect x="13.5" y="5" width="4" height="14" rx="1.3"></rect></svg>
            </span>
          </button>
          <button id="voteSkipBtn" class="ctrl-btn" title="Vote to skip" onclick="openVoteModal()" disabled>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4l10 8-10 8V4z"></path><line x1="19" y1="5" x2="19" y2="19"></line></svg>
          </button>
        </div>

        <div class="volume-row" id="div-volume">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path></svg>
          <div id="vol-track" class="vol-track">
            <div id="vol-fill" class="vol-fill"></div>
            <div id="vol-thumb" class="vol-thumb"></div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 6a9 9 0 0 1 0 12"></path></svg>
        </div>
      </div>

      <footer>
        <a href="https://ssamjh.nz/" target="_blank">Primary Website</a>
        <span class="sep">·</span>
        <a href="https://github.com/ssamjh/JoinMyMusic.com" target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.49v-1.7c-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.34 1.12 2.91.86.09-.66.35-1.12.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.84c.85 0 1.71.12 2.51.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.94.68 1.9v2.82c0 .27.18.59.69.49A10.02 10.02 0 0 0 22 12.26C22 6.58 17.52 2 12 2z"></path></svg>
          GitHub
        </a>
        <span class="sep">·</span>
        <span>© 2026 ssamjh</span>
      </footer>
    </div>

    <audio id="audio-stream" preload="none" crossorigin="anonymous"></audio>

    <!-- Toast -->
    <div id="toast" class="toast">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      <span id="toast-text"></span>
    </div>

    <!-- Request modal -->
    <div id="songRequestModal" class="modal-overlay" onclick="closeModalsFromOverlay(event)">
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h2>Request a song</h2>
          <button class="modal-close" onclick="closeModals()" aria-label="Close">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
          </button>
        </div>
        <div style="padding:0 24px 8px;display:flex;flex-direction:column;gap:12px;">
          <input id="requesterName" class="field" placeholder="Your name" />
          <div class="search-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="songSearchInput" class="field" placeholder="Search for a song or artist…" autocomplete="off" />
          </div>
        </div>
        <div id="searchResults" class="results">
          <div class="results-msg">Start typing to search for a song.</div>
        </div>
      </div>
    </div>

    <!-- Confirm request modal -->
    <div id="songConfirmModal" class="modal-overlay" style="z-index:52" onclick="closeModalsFromOverlay(event)">
      <div class="modal-card narrow" onclick="event.stopPropagation()" style="text-align:center;">
        <div class="modal-body-center">
          <img id="confirm-song-image" src="" alt="Album Cover" />
          <div id="confirm-song-title" class="confirm-title"></div>
          <div id="confirm-song-artist" class="confirm-artist"></div>
          <div class="spotify-preview-container">
            <iframe id="spotify-preview" src="about:blank" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
          </div>
          <div class="turnstile-wrap">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAAAeaz0KAvdHl7LvY" data-callback="enableConfirmButton"></div>
          </div>
          <div class="confirm-prompt">Add this to the queue?</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="backToRequest()">Back</button>
          <button id="confirmRequestBtn" class="btn btn-accent">Request</button>
        </div>
      </div>
    </div>

    <!-- Vote skip modal -->
    <div id="voteSkipModal" class="modal-overlay" style="z-index:52" onclick="closeModalsFromOverlay(event)">
      <div class="modal-card narrow" onclick="event.stopPropagation()" style="text-align:center;">
        <div style="padding:32px 28px 22px;">
          <h2 style="font-size:20px;font-weight:700;letter-spacing:-0.02em;margin:0;">Vote to skip?</h2>
          <div style="font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5;">
            Skip the current song if enough listeners agree.
          </div>
          <div class="vote-stat">
            <span class="num" id="vote-count">0</span>
            <span class="den">/ <span id="votes-needed">0</span> votes</span>
          </div>
          <div class="vote-bar"><div id="vote-bar-fill"></div></div>
          <div class="turnstile-wrap">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAAAeaz0KAvdHl7LvY" data-callback="enableVoteSkipButton"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
          <button id="confirmVoteSkipBtn" class="btn btn-danger" disabled>Vote to skip</button>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>

    <noscript>
      <img
        src="https://stats.sjh.at/ingress/f843459e-231c-4d54-902d-5618ed0cb73d/pixel.gif" />
    </noscript>
    <script
      defer
      src="https://stats.sjh.at/ingress/f843459e-231c-4d54-902d-5618ed0cb73d/script.js"></script>
  </body>
</html>
